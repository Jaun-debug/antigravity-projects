<style>

   DT Enquiry Wizard - Styles
   Wilderness Destinations Enquiry Wizard
   ============================================= */

}

#enquiry-wizard-root .dew-overlay[style*="display: flex"],
#enquiry-wizard-root .dew-overlay.dew-visible {

}

.dew-back-btn:hover { opacity: 0.7; }

  function getCountryByCode(dialCode) {
    for (var i = 0; i < COUNTRY_CODES.length; i++) {
      if (COUNTRY_CODES[i].code === dialCode) return COUNTRY_CODES[i];
    }
    return COUNTRY_CODES[0];
  }


  /* -----------------------------------------
     STEP DEFINITIONS
     Step flow:
     1 - Where would you like to travel? (country)
     2 - What type of safari? (safari type)
     3 - When would you like to travel? (timing choice)
     4 - When would you like to travel? (calendar - only if "I know exactly when")
     5 - Who are you travelling with? (companions)
     6 - What is your travel budget per person? (budget)
     7 - Tell us more about your trip (optional details)
     8 - Where can we send your trip suggestions? (contact form)
     ----------------------------------------- */

  /* -----------------------------------------
     STATE MODEL
     ----------------------------------------- */
  var state = {
    currentStep: 1,
    answers: {
      country: null,
      safariType: null,
      travelTiming: null,
      dateRangeStart: null,
      dateRangeEnd: null,
      travelCompanion: null,
      isTradeAgent: false,
      isMediaEnquiry: false,
      budget: null,
      tripDetails: '',
      referred: null,
      email: '',
      firstName: '',
      surname: '',
      phoneCode: '+264',
      phone: '',
      contactPreference: 'email',
      newsletter: false
    },
    stepHistory: [1]
  };

  var rootEl = null;
  var overlayEl = null;

  /* No URL manipulation - wizard is purely overlay-based */

  /* -----------------------------------------
     NAVIGATION
     Handles step transitions, back/forward,
     and URL synchronisation.
     ----------------------------------------- */

  function goToStep(step) {
    state.currentStep = step;
    if (state.stepHistory[state.stepHistory.length - 1] !== step) {
      state.stepHistory.push(step);
    }
    render();
  }

  function goBack() {
    if (state.stepHistory.length > 1) {
      state.stepHistory.pop();
      state.currentStep = state.stepHistory[state.stepHistory.length - 1];
      render();
    }
  }

  /* Determine the next step based on current step and answers */
  function getNextStep(currentStep) {
    /* Step 3 -> Step 4 only if "I know exactly when", else skip to Step 5 */
    if (currentStep === 3) {
      if (state.answers.travelTiming === 'exact') {
        return 4;
      }
      return 5;
    }
    /* Step 4 (calendar) -> Step 5 */
    if (currentStep === 4) {
      return 5;
    }
    return currentStep + 1;
  }

  /* Handle Next button click */
  function handleNext() {
    var next = getNextStep(state.currentStep);
    if (next <= TOTAL_STEPS) {
      goToStep(next);
    }
  }

  var OVERLAY_BG = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:999999;background-image:url(https://desert-tracks.com/wp-content/uploads/2026/03/solly-lion-and-cub-large-1.jpeg);background-size:cover;background-position:center center;background-repeat:no-repeat;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;overflow-x:hidden;color:#ffffff;';
  var DARK_LAYER_CSS = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(25, 22, 16, 0.45);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:0;pointer-events:none;';

  function addDarkLayer() {
    var darkLayer = document.createElement('div');
    darkLayer.className = 'dew-dark-layer';
    darkLayer.style.cssText = DARK_LAYER_CSS;
    overlayEl.appendChild(darkLayer);
  }

  function closeWizard() {
    state._wizardOpen = false;
    if (overlayEl) {
      overlayEl.style.cssText = 'display:none;' + OVERLAY_BG;
      overlayEl.innerHTML = '';
    }
    if (rootEl) {
      rootEl.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden;pointer-events:none;';
    }
    var scrollY = document.body.style.top;
    document.body.style.overflow = '';
    document.body.style.overflowX = '';
    document.body.style.position = '';
    document.body.style.width = '';
    document.body.style.top = '';
    document.documentElement.style.overflow = '';
    document.documentElement.style.overflowX = '';
    window.scrollTo(0, parseInt(scrollY || '0') * -1);
  }

  function openWizard() {
    state._wizardOpen = true;
    state.currentStep = 1;
    state.stepHistory = [1];
    state._submitted = false;
    state._sourceUrl = window.location.href;
    state._sourceTitle = document.title;
    state._wizardStart = Date.now();
    state._gclid = new URLSearchParams(window.location.search).get('gclid') || '';
    if (overlayEl) {
      if (rootEl) {
        rootEl.style.cssText = 'position:absolute;width:0;height:0;overflow:visible;pointer-events:auto;';
      }
      document.body.style.overflow = 'hidden';
      document.body.style.overflowX = 'hidden';
      document.body.style.position = 'fixed';
      document.body.style.width = '100%';
      document.body.style.top = '-' + window.scrollY + 'px';
      document.documentElement.style.overflow = 'hidden';
      document.documentElement.style.overflowX = 'hidden';
      overlayEl.style.cssText = 'display:flex;' + OVERLAY_BG;
      overlayEl.innerHTML = '';
      addDarkLayer();
      render();
      window.scrollTo(0, 0);
    }
  }

  /* -----------------------------------------
     OPTION BUTTON COMPONENT
     Creates a selectable button that acts
     like a radio button (single selection).
     ----------------------------------------- */
  function createOptionButton(text, value, currentValue, onClick, extraClass) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = (extraClass || 'dew-option-btn') + (currentValue === value ? ' dew-active' : '');
    btn.textContent = text;
    btn.setAttribute('role', 'radio');
    btn.setAttribute('aria-checked', currentValue === value ? 'true' : 'false');
    btn.addEventListener('click', function () {
      onClick(value);
    });
    return btn;
  }

  /* -----------------------------------------
     PROGRESS BAR COMPONENT
     Shows step progression at the bottom.
     ----------------------------------------- */
  function createProgressBar() {
    var totalStepsForProgress = TOTAL_STEPS;
    var progress = (state.currentStep / totalStepsForProgress) * 100;

    var bar = document.createElement('div');
    bar.className = 'dew-progress-bar';
    var fill = document.createElement('div');
    fill.className = 'dew-progress-fill';
    fill.style.width = progress + '%';
    bar.appendChild(fill);
    return bar;
  }

  /* -----------------------------------------
     NAVIGATION CONTROLS COMPONENT
     ----------------------------------------- */
  function createNavArea(options) {
    var nav = document.createElement('div');
    nav.className = 'dew-nav-area';

    var btnsWrap = document.createElement('div');
    btnsWrap.className = 'dew-nav-buttons';

    if (options.showSkip) {
      var skipBtn = document.createElement('button');
      skipBtn.type = 'button';
      skipBtn.className = 'dew-skip-btn';
      skipBtn.innerHTML = 'SKIP &gt;';
      skipBtn.addEventListener('click', function () {
        if (options.onSkip) options.onSkip();
        else handleNext();
      });
      btnsWrap.appendChild(skipBtn);
    }

    if (options.showNext) {
      var nextBtn = document.createElement('button');
      nextBtn.type = 'button';
      nextBtn.className = 'dew-next-btn';
      nextBtn.innerHTML = 'NEXT &gt;';
      nextBtn.disabled = !!options.nextDisabled;
      nextBtn.addEventListener('click', function () {
        if (options.onNext) options.onNext();
        else handleNext();
      });
      btnsWrap.appendChild(nextBtn);
    }

    if (options.showSubmit) {
      var submitBtn = document.createElement('button');
      submitBtn.type = 'button';
      submitBtn.className = 'dew-submit-btn';
      submitBtn.textContent = 'SUBMIT';
      submitBtn.disabled = !!options.submitDisabled;
      submitBtn.addEventListener('click', function () {
        if (options.onSubmit) options.onSubmit();
      });
      btnsWrap.appendChild(submitBtn);
    }

    nav.appendChild(btnsWrap);

    if (options.privacyText) {
      var privacyEl = document.createElement('p');
      privacyEl.className = 'dew-privacy-text';
      privacyEl.innerHTML = 'All information provided will be processed by Desert Tracks in accordance with our <a href="#" target="_blank">privacy policy</a>.';
      nav.appendChild(privacyEl);
    }

    var emailEl = document.createElement('p');
    emailEl.style.cssText = 'margin:0 0 10px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:12px;color:rgba(255,255,255,0.55);text-align:center;letter-spacing:0.3px;';
    emailEl.innerHTML = 'Prefer to email? <a href="mailto:bookings@desert-tracks.com" style="color:rgba(255,255,255,0.75);text-decoration:underline;">bookings@desert-tracks.com</a>';
    nav.appendChild(emailEl);

    nav.appendChild(createProgressBar());
    return nav;
  }

     CLOSE BUTTON COMPONENT
     ----------------------------------------- */
  function createCloseButton() {
    var btn = document.createElement('button');
    btn.type = 'button';

    btn.setAttribute('aria-label', 'Close enquiry wizard');

     ----------------------------------------- */
  function createBackButton() {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'dew-back-btn' + (state.currentStep === 1 ? ' dew-hidden' : '');
    btn.innerHTML = '<span class="dew-back-arrow">&lsaquo;</span> BACK';

  }

  /* -----------------------------------------
     STEP 1: Where would you like to travel?
     Country selection with 8 countries + fallback
     ----------------------------------------- */
  function renderStep1() {
    var wrapper = document.createElement('div');
    wrapper.className = 'dew-step-content';

    var heading = document.createElement('h2');
    heading.className = 'dew-heading';
    heading.style.color = '#ffffff';
    heading.textContent = 'Where would you like to travel?';
    wrapper.appendChild(heading);

    var countries = [
      'Namibia', 'Botswana', 'Zimbabwe',
      'South Africa', 'Tanzania', 'Kenya',
      'Zambia', 'Rwanda'
    ];

    var grid = document.createElement('div');
    grid.className = 'dew-options-grid';

    countries.forEach(function (c) {
      grid.appendChild(createOptionButton(c.toUpperCase(), c, state.answers.country, function (val) {
        state.answers.country = val;
        render();
      }));
    });

    wrapper.appendChild(grid);

    var fallback = createOptionButton("I HAVEN'T DECIDED YET", 'undecided', state.answers.country, function (val) {
      state.answers.country = val;
      render();
    }, 'dew-option-fallback');
    wrapper.appendChild(fallback);

    return {
      content: wrapper,
      navOptions: {
        showNext: true,

  /* -----------------------------------------
     STEP 4: Calendar date picker
     Only shown when user selected "I know exactly when"
     Two-month side-by-side calendar
     ----------------------------------------- */
  function renderStep4() {
    var wrapper = document.createElement('div');
    wrapper.className = 'dew-step-content';

    var heading = document.createElement('h2');
    heading.className = 'dew-heading';
    heading.style.color = '#ffffff';
    heading.textContent = 'When would you like to travel?';
    wrapper.appendChild(heading);

    var now = new Date();
    var calendarBaseMonth = state._calendarMonth || now.getMonth();
    var calendarBaseYear = state._calendarYear || now.getFullYear();

    if (!state._calendarMonth && state._calendarMonth !== 0) {
      state._calendarMonth = calendarBaseMonth;
      state._calendarYear = calendarBaseYear;
    }

    var month1 = state._calendarMonth;
    var year1 = state._calendarYear;
    var month2 = month1 + 1;
    var year2 = year1;
    if (month2 > 11) {
      month2 = 0;
      year2 = year1 + 1;
    }

    var monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    var dayLabels = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];

    var nav = document.createElement('div');
    nav.className = 'dew-calendar-nav';

    var prevBtn = document.createElement('button');
    prevBtn.type = 'button';
    prevBtn.className = 'dew-calendar-nav-btn';
    prevBtn.innerHTML = '&lsaquo;';
    prevBtn.addEventListener('click', function () {
      state._calendarMonth--;
      if (state._calendarMonth < 0) {
        state._calendarMonth = 11;
        state._calendarYear--;
      }
      render();
    });

    var title1 = document.createElement('span');
    title1.className = 'dew-calendar-month-title';
    title1.textContent = monthNames[month1] + ' ' + year1;

    var title2 = document.createElement('span');
    title2.className = 'dew-calendar-month-title';
    title2.textContent = monthNames[month2] + ' ' + year2;

    var nextBtn = document.createElement('button');
    nextBtn.type = 'button';
    nextBtn.className = 'dew-calendar-nav-btn';
    nextBtn.innerHTML = '&rsaquo;';
    nextBtn.addEventListener('click', function () {
      state._calendarMonth++;
      if (state._calendarMonth > 11) {
        state._calendarMonth = 0;
        state._calendarYear++;
      }
      render();
    });

    nav.appendChild(prevBtn);
    nav.appendChild(title1);
    nav.appendChild(title2);
    nav.appendChild(nextBtn);
    wrapper.appendChild(nav);

    function buildMonth(month, year) {
      var cal = document.createElement('div');
      cal.className = 'dew-calendar';

      var header = document.createElement('div');
      header.className = 'dew-calendar-header';
      dayLabels.forEach(function (d) {
        var lbl = document.createElement('div');
        lbl.className = 'dew-calendar-day-label';
        lbl.textContent = d;
        header.appendChild(lbl);
      });
      cal.appendChild(header);

      var grid = document.createElement('div');
      grid.className = 'dew-calendar-grid';

      var firstDay = new Date(year, month, 1).getDay();
      var startOffset = firstDay === 0 ? 6 : firstDay - 1;
      var daysInMonth = new Date(year, month + 1, 0).getDate();
      var today = new Date();

      for (var i = 0; i < startOffset; i++) {
        var empty = document.createElement('div');
        empty.className = 'dew-calendar-day dew-empty';
        grid.appendChild(empty);
      }

      for (var d = 1; d <= daysInMonth; d++) {
        var dayEl = document.createElement('div');
        dayEl.className = 'dew-calendar-day';
        dayEl.textContent = d;

        var thisDate = new Date(year, month, d);

        if (thisDate.toDateString() === today.toDateString()) {
          dayEl.classList.add('dew-today');
        }

        if (thisDate < new Date(today.getFullYear(), today.getMonth(), today.getDate())) {
          dayEl.classList.add('dew-past');
        } else {
          (function (date) {
            dayEl.addEventListener('click', function () {
              handleDateClick(date);
            });
          })(thisDate);
        }

        if (state.answers.dateRangeStart && state.answers.dateRangeEnd) {
          var start = new Date(state.answers.dateRangeStart);
          var end = new Date(state.answers.dateRangeEnd);
          if (thisDate.toDateString() === start.toDateString()) {
            dayEl.classList.add('dew-range-start');
          } else if (thisDate.toDateString() === end.toDateString()) {
            dayEl.classList.add('dew-range-end');
          } else if (thisDate > start && thisDate < end) {
            dayEl.classList.add('dew-range');
          }
        } else if (state.answers.dateRangeStart) {
          var s = new Date(state.answers.dateRangeStart);
          if (thisDate.toDateString() === s.toDateString()) {
            dayEl.classList.add('dew-range-start');
          }
        }

        grid.appendChild(dayEl);
      }

      cal.appendChild(grid);
      return cal;
    }

    var container = document.createElement('div');
    container.className = 'dew-calendar-container';
    container.appendChild(buildMonth(month1, year1));
    container.appendChild(buildMonth(month2, year2));
    wrapper.appendChild(container);

    return {
      content: wrapper,
      navOptions: {
        showNext: true,
        nextDisabled: !state.answers.dateRangeStart
      }
    };
  }

  function handleDateClick(date) {
    if (!state.answers.dateRangeStart || (state.answers.dateRangeStart && state.answers.dateRangeEnd)) {
      state.answers.dateRangeStart = date.toISOString();
      state.answers.dateRangeEnd = null;
    } else {
      var start = new Date(state.answers.dateRangeStart);
      if (date < start) {
        state.answers.dateRangeStart = date.toISOString();
      } else {
        state.answers.dateRangeEnd = date.toISOString();
      }
    }
    render();
  }

  /* -----------------------------------------
     FORM SUBMISSION
     Sends data via fetch() to the configured
     endpoint. No page reload.
     ----------------------------------------- */
  function handleSubmit() {
    if (!state.answers.email || !state.answers.firstName || !state.answers.surname) {
      return;
    }

    if (state._honeypot) {
      console.log('DT Wizard: bot detected (honeypot filled)');
      state._submitted = true;
      render();
      return;
    }

    var elapsed = Date.now() - (state._wizardStart || Date.now());
    if (elapsed < 5000) {
      console.log('DT Wizard: bot detected (submitted too fast)');
      state._submitted = true;
      render();
      return;
    }

    var payload = {
      sourceUrl: state._sourceUrl || window.location.href,
      sourcePageTitle: state._sourceTitle || document.title,
      country: state.answers.country,
      safariType: state.answers.safariType,
      travelTiming: state.answers.travelTiming,
      dateRangeStart: state.answers.dateRangeStart ? new Date(state.answers.dateRangeStart).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : null,
      dateRangeEnd: state.answers.dateRangeEnd ? new Date(state.answers.dateRangeEnd).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : null,
      travelCompanion: state.answers.travelCompanion,
      isTradeAgent: state.answers.isTradeAgent,
      isMediaEnquiry: state.answers.isMediaEnquiry,
      budget: state.answers.budget,
      tripDetails: state.answers.tripDetails,
      referred: state.answers.referred,
      email: state.answers.email,
      firstName: state.answers.firstName,
      surname: state.answers.surname,
      phone: state.answers.phoneCode + ' ' + state.answers.phone,
      contactPreference: state.answers.contactPreference,
      newsletter: state.answers.newsletter,
      gclid: state._gclid || '',
      source: state._gclid ? 'Google Ads' : 'Direct / Organic'
    };

    state._submitted = true;
    render();

    fetch(SUBMIT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function (err) {
      console.warn('DT Enquiry Wizard: Submission endpoint not available.', err);
    });

    var leadScore = 0;

    if (state.answers.budget === '20k-40k') leadScore += 6;
    else if (state.answers.budget === '10k-20k') leadScore += 4;
    else if (state.answers.budget === '7.5k-10k') leadScore += 2;

    if (state.answers.safariType === 'Fly-In Safari') leadScore += 3;
    if (state.answers.safariType === 'Luxury Safari') leadScore += 3;

    if (state.answers.travelCompanion === 'couple') leadScore += 2;
    if (state.answers.travelCompanion === 'family') leadScore += 1;

    if (state.answers.isTradeAgent) leadScore += 3;

    if (state.answers.travelTiming === 'exact') leadScore += 1;

    if (state.answers.country === 'Botswana' || state.answers.country === 'Namibia' || state.answers.country === 'Rwanda') leadScore += 2;

    if (state.answers.tripDetails && state.answers.tripDetails.length > 300) leadScore += 2;
    else if (state.answers.tripDetails && state.answers.tripDetails.length > 100) leadScore += 1;

    if (state.answers.newsletter) leadScore += 1;
    if (state.answers.phone && state.answers.phone.length > 5) leadScore += 1;

    var completionSeconds = Math.round((Date.now() - (state._wizardStart || Date.now())) / 1000);
    var deviceType = /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop';

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      'event': 'wizard_enquiry_submitted',
      'lead_score': leadScore,
      'enhanced_conversion_data': {
        'email': (state.answers.email || '').trim().toLowerCase(),
        'first_name': state.answers.firstName,
        'last_name': state.answers.surname,
        'phone_number': ((state.answers.phoneCode || '') + (state.answers.phone || '')).replace(/\s/g, '')
      },
      'safari_country': state.answers.country,
      'safari_budget': state.answers.budget,
      'safari_type': state.answers.safariType,
      'travel_companion': state.answers.travelCompanion,
      'completion_time_seconds': completionSeconds,
      'device_type': deviceType,
      'gclid': state._gclid || '',
      'estimated_value': (function() { var v = 0; if (state.answers.budget === '3k-7.5k') v = 5000; if (state.answers.budget === '7.5k-10k') v = 8500; if (state.answers.budget === '10k-20k') v = 15000; if (state.answers.budget === '20k-40k') v = 30000; return v; })()
    });

    var estimatedValue = 0;
    if (state.answers.budget === '3k-7.5k') estimatedValue = 5000;
    if (state.answers.budget === '7.5k-10k') estimatedValue = 8500;
    if (state.answers.budget === '10k-20k') estimatedValue = 15000;
    if (state.answers.budget === '20k-40k') estimatedValue = 30000;

    if (typeof gtag === 'function') {
      gtag('set', 'user_data', {
        'email': (state.answers.email || '').trim().toLowerCase(),
        'phone_number': ((state.answers.phoneCode || '') + (state.answers.phone || '')).replace(/\s/g, ''),
        'address': {
          'first_name': state.answers.firstName,
          'last_name': state.answers.surname
        }
      });
      gtag('event', 'conversion', {
        'send_to': 'AW-10780198601/NUe-CPSfz_4bEMmNs5Qo',
        'value': estimatedValue || leadScore,
        'currency': 'USD'
      });
    }
    console.log('DT Wizard: conversion fired - leadScore=' + leadScore + ' estimatedValue=$' + estimatedValue + ' budget=' + state.answers.budget + ' gclid=' + (state._gclid || 'none'));
  }

  /* -----------------------------------------
     STEP ROUTER
     Determines which step component to render
     based on the current step number.
     ----------------------------------------- */
  function routeStep() {
    if (state._submitted) {
      return renderSuccess();
    }

    switch (state.currentStep) {
      case 1: return renderStep1();
      case 2: return renderStep2();
      case 3: return renderStep3();
      case 4: return renderStep4();
      case 5: return renderStep5();
      case 6: return renderStep6();
      case 7: return renderStep7();
      case 8: return renderStep8();
      default: return renderStep1();
    }
  }

  /* -----------------------------------------
     MAIN RENDER
     Clears and rebuilds the overlay content
     based on current state.
     ----------------------------------------- */
  function render() {
    if (!overlayEl) return;

    overlayEl.innerHTML = '';
    addDarkLayer();

    overlayEl.appendChild(createCloseButton());
    overlayEl.appendChild(createBackButton());

    var container = document.createElement('div');
    container.className = 'dew-step-container';

    var stepResult = routeStep();
    container.appendChild(stepResult.content);

    overlayEl.appendChild(container);

    if (stepResult.navOptions && (stepResult.navOptions.showNext || stepResult.navOptions.showSubmit || stepResult.navOptions.showSkip)) {
      var navArea = createNavArea(stepResult.navOptions);
      container.appendChild(navArea);

      submitBtnEl = navArea.querySelector('.dew-submit-btn');
    } else if (!state._submitted) {
      var progressOnly = document.createElement('div');
      progressOnly.className = 'dew-nav-area';
      progressOnly.appendChild(createProgressBar());
      container.appendChild(progressOnly);
    }
  }

  /* -----------------------------------------
     WIZARD APP INIT
     Mounts the wizard to #enquiry-wizard-root.
     ----------------------------------------- */
  function init() {
    rootEl = document.getElementById('enquiry-wizard-root');
    if (!rootEl) return;

    rootEl.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden;pointer-events:none;';

    overlayEl = document.createElement('div');
    overlayEl.className = 'dew-overlay';
    overlayEl.style.cssText = 'display:none;' + OVERLAY_BG;
    addDarkLayer();
    rootEl.appendChild(overlayEl);

    function handleTrigger(e) {
      if (state._wizardOpen) return;

      var el = e.target.closest('[data-enquiry-trigger], .enquiry-trigger, .dt-enquiry-open, .dt-enquire, .inq');
      if (el) {
        e.preventDefault();
        e.stopImmediatePropagation();
        openWizard();
        return false;
      }

      var link = e.target.closest('a, button, div');
      if (link) {
        var text = (link.textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
        if (text === 'enquire now' || text === 'enquiry now' || text === 'enquire' || text === 'make an enquiry' || text === 'start your journey' || text === 'contact') {
          e.preventDefault();
          e.stopImmediatePropagation();
          openWizard();
          return false;
        }
        var href = link.getAttribute ? (link.getAttribute('href') || '') : '';
        if (href.indexOf('desert-tracks-contact') !== -1) {
          e.preventDefault();
          e.stopImmediatePropagation();
          openWizard();
          return false;
        }
      }
    }

    document.addEventListener('click', handleTrigger, true);
    document.addEventListener('touchstart', handleTrigger, { capture: true, passive: false });

    window.dtEnquiryWizard = { open: openWizard, close: closeWizard };
  }

  /* Mount when DOM is ready */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
