<style data-no-optimize="1">
.dt-cin2-hero {
    position: relative;
    width: 100vw;
    margin-left: calc(-50vw + 50%);
    /* STOPPING THE BOTTOM SPACE: Removed height 100vh and min-height! */
    /* Using Snug Padding instead to perfectly wrap the content */
    padding: 140px 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
}
.dt-cin2-bg {
    position: absolute;
    inset: -15%;
    width: 130%;
    height: 130%;
    background-image: url('https://desert-tracks.com/wp-content/uploads/2026/03/meerkat_baby_solly_large.jpeg');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    transform: scale(1.05);
    transform-origin: center center;
    will-change: transform;
    z-index: 1;
}
.dt-cin2-gradient {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: linear-gradient(180deg,rgba(0,0,0,0.08) 0%,rgba(0,0,0,0.20) 25%,rgba(0,0,0,0.58) 55%,rgba(0,0,0,0.75) 100%);
}
.dt-cin2-vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: radial-gradient(ellipse at center,rgba(0,0,0,0) 55%,rgba(0,0,0,0.35) 100%);
    pointer-events: none;
}
.dt-cin2-content {
    position: relative;
    z-index: 4;
    text-align: center;
    max-width: 820px;
    padding: 0 40px;
}
.dt-cin2-eyebrow {
    display: block;
    font-family: 'Open Sans', Arial, sans-serif !important;
    font-size: 0.85rem !important; 
    font-weight: 500 !important;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: #ffffff !important;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(40px);
    filter: blur(6px);
    will-change: opacity, transform, filter;
}
.dt-cin2-title {
    font-family: 'Cinzel', serif !important;
    font-size: clamp(2.5rem, 5vw, 3.5rem) !important; 
    font-weight: 400 !important;
    line-height: 1.1 !important;
    margin: 0 0 32px 0 !important;
    color: #ffffff !important;
    letter-spacing: 0.05em;
    opacity: 0;
    transform: translateY(40px);
    filter: blur(6px);
    will-change: opacity, transform, filter;
}
.dt-cin2-desc {
    font-family: 'Open Sans', Arial, sans-serif !important;
    font-size: 0.95rem !important;
    font-weight: 300 !important;
    line-height: 1.625 !important;
    color: #ffffff !important;
    margin: 0 auto 42px auto !important;
    max-width: 620px;
    opacity: 0;
    transform: translateY(40px);
    filter: blur(6px);
    will-change: opacity, transform, filter;
}
.dt-cin2-cta {
    display: inline-block;
    font-family: 'Open Sans', Arial, sans-serif !important;
    font-size: 0.75rem !important;
    font-weight: 600 !important;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #ffffff !important;
    text-decoration: none !important;
    border: 1px solid rgba(255,255,255,0.6) !important;
    padding: 16px 38px;
    transition: background 0.5s ease, border-color 0.5s ease;
    opacity: 0;
    transform: translateY(40px);
    filter: blur(6px);
    will-change: opacity, transform, filter;
    background: transparent !important;
}
.dt-cin2-cta:hover {
    background: rgba(255,255,255,0.12) !important;
    border-color: #ffffff !important;
    color: #ffffff !important;
}
@media (max-width: 768px) {
    .dt-cin2-bg { inset: -10%; width: 120%; height: 120%; }
    .dt-cin2-content { padding: 0 28px; }
    .dt-cin2-title { font-size: clamp(2rem, 8vw, 3rem) !important; }
    .dt-cin2-desc { font-size: 0.9rem !important; }
}
</style>

<section class="dt-cin2-hero" id="dtCin2Hero">
    <div class="dt-cin2-bg" id="dtCin2Bg"></div>
    <div class="dt-cin2-gradient"></div>
    <div class="dt-cin2-vignette"></div>
    <div class="dt-cin2-content">
        <span class="dt-cin2-eyebrow" id="dtCin2Eyebrow">Start Your Journey</span>
        <h2 class="dt-cin2-title" id="dtCin2Title">African Safari Experiences</h2>
        <p class="dt-cin2-desc" id="dtCin2Desc">Specialising in Namibia and curated journeys across Southern and East Africa, we design bespoke safaris that combine extraordinary landscapes, wildlife, and culture.</p>
        <a class="dt-cin2-cta" id="dtCin2Cta" href="https://desert-tracks.com/safari-booking/">Start Your Journey</a>
    </div>
</section>

<!-- CRITICAL FIX: The GSAP CDN scripts have been removed to prevent destroying the Lion Block at the top of the page. -->
<script data-no-optimize="1">
(function(){
    function initCinematicHero2(){
        var hero=document.getElementById('dtCin2Hero'),
            bg=document.getElementById('dtCin2Bg'),
            eyebrow=document.getElementById('dtCin2Eyebrow'),
            title=document.getElementById('dtCin2Title'),
            desc=document.getElementById('dtCin2Desc'),
            cta=document.getElementById('dtCin2Cta');
        if(!hero||!bg||typeof gsap==='undefined'||typeof ScrollTrigger==='undefined'||hero.dataset.ready)return;
        hero.dataset.ready='1';
        var mob=window.innerWidth<=768;

        gsap.to(bg,{
            scale:mob?1.18:1.28,
            y:mob?'10%':'18%',
            ease:'none',
            scrollTrigger:{trigger:hero,start:'top 85%',end:'bottom top',scrub:1.5}
        });

        gsap.set([eyebrow,title,desc,cta],{opacity:0,y:35,filter:'blur(5px)'});
        var tl=gsap.timeline({
            scrollTrigger:{trigger:hero,start:'top 50%',end:'bottom 10%',scrub:1.5}
        });
        tl.to(eyebrow,{opacity:1,y:0,filter:'blur(0px)',ease:'power1.out',duration:4})
          .to(title,  {opacity:1,y:0,filter:'blur(0px)',ease:'power1.out',duration:4},'-=3')
          .to(desc,   {opacity:1,y:0,filter:'blur(0px)',ease:'power1.out',duration:4},'-=3')
          .to(cta,    {opacity:1,y:0,filter:'blur(0px)',ease:'power1.out',duration:4},'-=2.8')
          .to([eyebrow,title,desc,cta],{opacity:1,ease:'none',duration:3})
          .to([eyebrow,title,desc,cta],{opacity:0,y:-18,filter:'blur(4px)',ease:'power1.in',duration:3});
    }
    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initCinematicHero2);}
    else{initCinematicHero2();}
    setTimeout(initCinematicHero2,800);
    setTimeout(initCinematicHero2,2000);
})();
</script>
