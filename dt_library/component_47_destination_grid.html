<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Destinations Grid</title>

    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Cinzel for Headlines, Open Sans for CTAs -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* ================================================
           DESERT TRACKS — PREMIUM DESTINATIONS GRID
           ================================================ */
        body {
            background-color: #f7f5f0;
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
        }

        .dt-destinations-section {
            width: 100%;
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .dt-dest-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .dt-dest-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            cursor: pointer;
            text-decoration: none !important;
            display: block;
            background: #123631; /* Deep Green fallback */
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            transform: translateZ(0); 
        }

        /* Background Image Layer */
        .dt-dest-bg {
            position: absolute;
            inset: -5%;
            width: 110%;
            height: 110%;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 1;
        }

        .dt-dest-card:hover .dt-dest-bg {
            transform: scale(1.05); /* Cinematic slow zoom */
        }

        /* Luxury Overlay Vignette ensuring white text always pops */
        .dt-dest-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.5) 100%);
            transition: background 0.5s ease;
        }

        .dt-dest-card:hover .dt-dest-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
        }

        /* Content Container */
        .dt-dest-content {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }

        /* Main Title (Cinzel) */
        .dt-dest-title {
            font-family: 'Cinzel', serif !important;
            font-size: clamp(1.6rem, 2.5vw, 2.2rem) !important;
            font-weight: 400 !important;
            color: #ffffff !important;
            margin: 0 !important;
            line-height: 1.25 !important;
            letter-spacing: 0.05em;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
            transition: transform 0.5s ease;
        }

        .dt-dest-card:hover .dt-dest-title {
            transform: translateY(-8px);
        }

        /* Explore Now CTA Feature */
        .dt-dest-cta {
            font-family: 'Open Sans', Arial, sans-serif !important;
            font-size: 0.75rem !important;
            font-weight: 600 !important;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #C9A24A !important; 
            margin-top: 16px !important;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .dt-dest-card:hover .dt-dest-cta {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive Grid Adjustments */
        @media (max-width: 1024px) {
            .dt-dest-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
        }

        @media (max-width: 640px) {
            .dt-dest-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .dt-dest-card {
                aspect-ratio: 16 / 11;
            }
            .dt-destinations-section {
                padding: 0 24px;
            }
            .dt-dest-title { transform: translateY(-8px); }
            .dt-dest-cta { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
