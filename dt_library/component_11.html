<style>
.dt-cin-hero {
    position: relative;
    width: 100vw;
    margin-left: calc(-50vw + 50%);
    height: 100vh;
    min-height: 600px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
}
.dt-cin-bg {
    position: absolute;
    inset: -15%;
    width: 130%;
    height: 130%;
    background-image: url('https://desert-tracks.com/wp-content/uploads/2026/03/xhki1815.jpeg');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    transform: scale(1.05);
    transform-origin: center center;
    will-change: transform;
    z-index: 1;
}
.dt-cin-gradient {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: linear-gradient(180deg,rgba(0,0,0,0.08) 0%,rgba(0,0,0,0.20) 25%,rgba(0,0,0,0.58) 55%,rgba(0,0,0,0.75) 100%);
}
.dt-cin-vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: radial-gradient(ellipse at center,rgba(0,0,0,0) 55%,rgba(0,0,0,0.35) 100%);
    pointer-events: none;
}
.dt-cin-content {
    position: relative;
    z-index: 4;
    text-align: center;
    max-width: 820px;
    padding: 0 40px;
}
.dt-cin-eyebrow {
    display: block;
    font-family: 'Open Sans', Arial, sans-serif !important;
    font-size: 0.85rem !important; 
    font-weight: 500 !important;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: #ffffff !important;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(40px);
    filter: blur(6px);
    will-change: opacity, transform, filter;
}
.dt-cin-title {
    font-family: 'Cinzel', serif !important;
    font-size: clamp(2.5rem, 5vw, 3.5rem) !important; 
    font-weight: 400 !important;
    line-height: 1.1 !important;
    margin: 0 0 32px 0 !important;
    color: #ffffff !important;
    letter-spacing: 0.05em;
    opacity: 0;
    transform: translateY(40px);
    filter: blur(6px);
    will-change: opacity, transform, filter;
}
.dt-cin-desc {
    font-family: 'Open Sans', Arial, sans-serif !important;
    font-size: 0.95rem !important;
    font-weight: 300 !important;
    line-height: 1.625 !important;
    color: #ffffff !important;
    margin: 0 auto 42px auto !important;
    max-width: 620px;
    opacity: 0;
    transform: translateY(40px);
    filter: blur(6px);
    will-change: opacity, transform, filter;
}
.dt-cin-cta {
    display: inline-block;
    font-family: 'Open Sans', Arial, sans-serif !important;
    font-size: 0.75rem !important;
    font-weight: 600 !important;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #ffffff !important;
    text-decoration: none !important;
    border: 1px solid rgba(255,255,255,0.6) !important;
    padding: 16px 38px;
    transition: background 0.5s ease, border-color 0.5s ease;
    opacity: 0;
    transform: translateY(40px);
    filter: blur(6px);
    will-change: opacity, transform, filter;
    background: transparent !important;
}
.dt-cin-cta:hover {
    background: rgba(255,255,255,0.12) !important;
    border-color: #ffffff !important;
    color: #ffffff !important;
}
@media (max-width: 768px) {
    .dt-cin-bg { inset: -10%; width: 120%; height: 120%; }
    .dt-cin-content { padding: 0 28px; }
    .dt-cin-title { font-size: clamp(2rem, 8vw, 3rem) !important; }
    .dt-cin-desc { font-size: 0.9rem !important; }
}
</style>

<section class="dt-cin-hero" id="dtCinHero">
    <div class="dt-cin-bg" id="dtCinBg"></div>
    <div class="dt-cin-gradient"></div>
    <div class="dt-cin-vignette"></div>
    <div class="dt-cin-content">
        <span class="dt-cin-eyebrow" id="dtCinEyebrow">Start Your Journey</span>
        <h2 class="dt-cin-title" id="dtCinTitle">African Safari Experiences</h2>
        <p class="dt-cin-desc" id="dtCinDesc">Specialising in Namibia and curated journeys across Southern and East Africa, we design bespoke safaris that combine extraordinary landscapes, wildlife, and culture.</p>
        <a class="dt-cin-cta" id="dtCinCta" href="https://desert-tracks.com/safari-booking/">Start Your Journey</a>
    </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" data-no-optimize="1"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" data-no-optimize="1"></script>
<script data-no-optimize="1">
(function(){
    function initCinematicHero(){
        var hero=document.getElementById('dtCinHero'),
            bg=document.getElementById('dtCinBg'),
            eyebrow=document.getElementById('dtCinEyebrow'),
            title=document.getElementById('dtCinTitle'),
            desc=document.getElementById('dtCinDesc'),
            cta=document.getElementById('dtCinCta');
        if(!hero||!bg||typeof gsap==='undefined'||hero.dataset.ready)return;
        hero.dataset.ready='1';
        gsap.registerPlugin(ScrollTrigger);
        var mob=window.innerWidth<=768;

        gsap.to(bg,{
            scale:mob?1.18:1.28,
            y:mob?'10%':'18%',
            ease:'none',
            scrollTrigger:{trigger:hero,start:'top 85%',end:'bottom top',scrub:1.5}
        });

        gsap.set([eyebrow,title,desc,cta],{opacity:0,y:35,filter:'blur(5px)'});
        var tl=gsap.timeline({
            scrollTrigger:{trigger:hero,start:'top 50%',end:'bottom 10%',scrub:1.5}
        });
        tl.to(eyebrow,{opacity:1,y:0,filter:'blur(0px)',ease:'power1.out',duration:4})
          .to(title,  {opacity:1,y:0,filter:'blur(0px)',ease:'power1.out',duration:4},'-=3')
          .to(desc,   {opacity:1,y:0,filter:'blur(0px)',ease:'power1.out',duration:4},'-=3')
          .to(cta,    {opacity:1,y:0,filter:'blur(0px)',ease:'power1.out',duration:4},'-=2.8')
          .to([eyebrow,title,desc,cta],{opacity:1,ease:'none',duration:3})
          .to([eyebrow,title,desc,cta],{opacity:0,y:-18,filter:'blur(4px)',ease:'power1.in',duration:3});
    }
    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initCinematicHero);}
    else{initCinematicHero();}
    setTimeout(initCinematicHero,800);
    setTimeout(initCinematicHero,2000);
})();
</script>
