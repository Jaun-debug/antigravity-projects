        .nav-items { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { 
            padding: 16px 20px; border-radius: 8px; cursor: pointer; transition: all 0.2s; 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: flex-start; gap: 6px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.08); transform: translateX(4px); border-color: rgba(255,255,255,0.15); }
        .nav-item.active { background: var(--orange); border-color: var(--orange); box-shadow: 0 4px 15px rgba(255,110,0,0.3); }
        .nav-item-title { font-weight: 500; font-size: 0.95rem; line-height: 1.3; }
        .nav-item-tag { font-size: 0.65rem; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; color: #fff; opacity: 0.9; }
        
        .footer { padding: 30px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; color: #888; text-align: center; }

        main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        header { background: #fff; height: 90px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; box-shadow: 0 1px 10px rgba(0,0,0,0.03); z-index: 5; flex-shrink: 0; }
        .title-area h2 { font-family: var(--font-head); font-size: 1.5rem; color: var(--dark); }
        .title-area p { font-size: 0.85rem; color: var(--muted); margin-top: 6px; max-width: 600px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .actions { display: flex; gap: 15px; }
        .btn { padding: 12px 24px; border-radius: 4px; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; border: none; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--orange); color: #fff; box-shadow: 0 4px 12px rgba(255,110,0,0.3); }
        .btn-primary:hover { background: #e06000; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(255,110,0,0.4); }
        
        .btn-secondary { background: var(--dark); color: #fff; }
        .btn-secondary:hover { background: #000; }

        .preview-container { flex: 1; padding: 40px; overflow: hidden; display: flex; flex-direction: column; }
        .iframe-wrap { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .iframe-toolbar { background: #fdfdfc; height: 40px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.r { background: #ff5f56; }
        .dot.y { background: #ffbd2e; }
        .dot.g { background: #27c93f; }
        
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        .toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: #27c93f; color: #fff; padding: 16px 32px; border-radius: 40px; box-shadow: 0 10px 30px rgba(39,201,63,0.3); font-weight: 700; font-size: 0.9rem; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .toast.show { bottom: 40px; }

        let activeIndex = -1; // ALWAYS load Welcome screen by default
        let openFolders = {}; // ALWAYS load folders closed by default
        // We still save to localStorage for potential future use, but we start fresh on load.

        function renderNav() {
            const container = document.getElementById('navContainer');
            container.innerHTML = '';
            
            // Helper to generate a main menu folder
            const buildMainFolder = (title) => {
                const details = document.createElement('details');
                details.open = openFolders.hasOwnProperty(title) ? openFolders[title] : false;
                
                // We no longer use native toggle listener because we destroy the element in click
                const summary = document.createElement('summary');
                summary.style.cssText = "font-size: 0.85rem; text-transform: uppercase; color: #fff; margin: 30px 0 10px 0; letter-spacing: 2.5px; font-weight: 800; cursor: pointer; list-style: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;";
                summary.innerHTML = title;
                
                // When clicking the main folder, toggle it manually, then load welcome screen for that category
                summary.addEventListener('click', (e) => {
                    e.preventDefault();
                    openFolders[title] = !details.open;
                    localStorage.setItem('vault_folders', JSON.stringify(openFolders));

                    if (title === 'Desert Tracks') {
                        loadComponent(-1, 'DESERT TRACKS COMPONENTS');
                    } else if (title === 'Rate Generator') {
                        loadComponent(-1, 'RATE GENERATOR');
                    } else if (title === 'Accounting & Costing') {
                        loadComponent(-1, 'ACCOUNTING & COSTING');
                    } else if (title === 'Antigravity Tools') {
                        loadComponent(-1, 'ANTIGRAVITY TOOLS');
                    } else if (title === 'Websites') {
                        loadComponent(-1, 'WEBSITES');
                    } else {
                        renderNav();
                    }
                });

                const inner = document.createElement('div');
                inner.style.cssText = "display: flex; flex-direction: column; gap: 4px; margin-left: 5px;";
                details.appendChild(summary);
                details.appendChild(inner);
                return { details, inner };
            };

            const buildFolder = (title, defaultOpen = false) => {
                const details = document.createElement('details');
                details.open = openFolders.hasOwnProperty(title) ? openFolders[title] : defaultOpen;
                details.addEventListener('toggle', (e) => {
                    openFolders[title] = e.target.open;
                    localStorage.setItem('vault_folders', JSON.stringify(openFolders));
                });
                const summary = document.createElement('summary');
                summary.style.cssText = "font-size: 0.75rem; text-transform: uppercase; color: #888; margin: 15px 0 5px 10px; letter-spacing: 2px; font-weight: 700; cursor: pointer; list-style: none; display: flex; align-items: center; user-select: none;";
                summary.innerHTML = title;
                const inner = document.createElement('div');
                inner.style.cssText = "display: flex; flex-direction: column; gap: 8px; margin-top: 10px;";
                details.appendChild(summary);
                details.appendChild(inner);
                return { details, inner };
            };

            const buildSubFolder = (key, title) => {
                const details = document.createElement('details');
                details.open = openFolders.hasOwnProperty(key) ? openFolders[key] : false;
                details.addEventListener('toggle', (e) => {
                    openFolders[key] = e.target.open;
                    localStorage.setItem('vault_folders', JSON.stringify(openFolders));
                });
                const summary = document.createElement('summary');
                summary.style.cssText = "font-size: 0.65rem; text-transform: uppercase; color: var(--orange); margin: 10px 0 5px 25px; letter-spacing: 1.5px; font-weight: 600; cursor: pointer; list-style: none;";
                summary.innerHTML = title;
                const inner = document.createElement('div');
                inner.style.cssText = "display: flex; flex-direction: column; gap: 8px; margin-left: 25px; margin-bottom: 10px;";
                details.appendChild(summary);
                details.appendChild(inner);
                return { details, inner };
            };

            const mainFolders = {
                'Desert Tracks': buildMainFolder('Desert Tracks'),
                'Rate Generator': buildMainFolder('Rate Generator'),
                'Accounting & Costing': buildMainFolder('Accounting & Costing'),
                'Antigravity Tools': buildMainFolder('Antigravity Tools'),
                'Websites': buildMainFolder('Websites')
            };

            const folders = {
                'HOMEPAGE': buildFolder('HOMEPAGE', false),
                'Self-Drive Safaris': buildFolder('Self-Drive Safaris', false),
                'Luxury Safaris': buildFolder('Luxury Safaris', false),
                'Fly-In Safaris': buildFolder('Fly-In Safaris', false),
                'Guided Safaris': buildFolder('Guided Safaris', false),
                'General WP Blocks': buildFolder('General WP Blocks', false)
            };

            const subFolders = {
                'HOMEPAGE_CTA': buildSubFolder('HOMEPAGE_CTA', 'WP Blocks'),
                'SD_ITIN': buildSubFolder('SD_ITIN', 'Itineraries'),
                'SD_BLOCKS': buildSubFolder('SD_BLOCKS', 'WP Blocks'),
                'LUX_ITIN': buildSubFolder('LUX_ITIN', 'Itineraries'),
                'LUX_BLOCKS': buildSubFolder('LUX_BLOCKS', 'WP Blocks'),
                'FLY_ITIN': buildSubFolder('FLY_ITIN', 'Itineraries'),
                'FLY_BLOCKS': buildSubFolder('FLY_BLOCKS', 'WP Blocks'),
                'GUI_ITIN': buildSubFolder('GUI_ITIN', 'Itineraries'),
                'GUI_BLOCKS': buildSubFolder('GUI_BLOCKS', 'WP Blocks')
            };

            // Attach subfolders
            folders['HOMEPAGE'].inner.appendChild(subFolders['HOMEPAGE_CTA'].details);

            folders['Self-Drive Safaris'].inner.appendChild(subFolders['SD_BLOCKS'].details);
            folders['Self-Drive Safaris'].inner.appendChild(subFolders['SD_ITIN'].details);

            folders['Luxury Safaris'].inner.appendChild(subFolders['LUX_BLOCKS'].details);
            folders['Luxury Safaris'].inner.appendChild(subFolders['LUX_ITIN'].details);

            folders['Fly-In Safaris'].inner.appendChild(subFolders['FLY_BLOCKS'].details);
            folders['Fly-In Safaris'].inner.appendChild(subFolders['FLY_ITIN'].details);

            folders['Guided Safaris'].inner.appendChild(subFolders['GUI_BLOCKS'].details);
            folders['Guided Safaris'].inner.appendChild(subFolders['GUI_ITIN'].details);

            // Attach folders to Desert Tracks Main Menu
            mainFolders['Desert Tracks'].inner.appendChild(folders['HOMEPAGE'].details);
            mainFolders['Desert Tracks'].inner.appendChild(folders['Self-Drive Safaris'].details);
            mainFolders['Desert Tracks'].inner.appendChild(folders['Luxury Safaris'].details);
            mainFolders['Desert Tracks'].inner.appendChild(folders['Fly-In Safaris'].details);
            mainFolders['Desert Tracks'].inner.appendChild(folders['Guided Safaris'].details);
            mainFolders['Desert Tracks'].inner.appendChild(folders['General WP Blocks'].details);

            components.forEach((cmp, idx) => {
                const el = document.createElement('div');
                el.className = 'nav-item ' + (idx === activeIndex ? 'active' : '');
                el.onclick = () => loadComponent(idx);
                el.innerHTML = '<div style="display:flex; justify-content:space-between; width:100%; align-items:flex-start;"><span class="nav-item-title">' + cmp.title + '</span></div>';

                let target = folders['General WP Blocks'].inner; // Default

                // Ratesheets
                if (cmp.id.includes('ratesheet') || cmp.id === 'ondili-rates-booking' || cmp.title.toLowerCase().includes('rate sheet')) {
                    target = mainFolders['Rate Generator'].inner;
                }
                // Accounting & Forms
                else if (cmp.id.includes('invoice') || cmp.id.includes('booking-reg') || cmp.id === 'costing_engine') {
                    target = mainFolders['Accounting & Costing'].inner;
                }
                // Homepage
                else if (cmp.id.includes('homepage') || cmp.id === 'component_17' || cmp.tag === 'Homepage CTA') {
                    target = subFolders['HOMEPAGE_CTA'].inner;
                }
                // Self-Drive
                else if (cmp.tag === 'Self-Drive FAQ' || cmp.id === 'self-drive-design' || cmp.tag === 'Self-Drive CTA' || cmp.id === 'carousel_self_drive' || cmp.id === 'self-drive-intro-text') {
                    target = subFolders['SD_BLOCKS'].inner;
                }
                else if (cmp.tag === 'Self-Drive Doc' || cmp.tag === 'Self-Drive Safaris') {
                    target = subFolders['SD_ITIN'].inner;
                }
                // Luxury
                else if (cmp.tag === 'Luxury FAQ' || cmp.id === 'luxury' || cmp.tag === 'Luxury CTA' || cmp.id === 'carousel_luxury' || cmp.id === 'luxury-intro-text') {
                    target = subFolders['LUX_BLOCKS'].inner;
                }
                else if (cmp.tag === 'Luxury Doc' || cmp.tag === 'Luxury Safaris') {
                    target = subFolders['LUX_ITIN'].inner;
                }
                // Fly-In
                else if (cmp.tag === 'Fly-In FAQ' || cmp.id === 'flyin' || cmp.tag === 'Fly-In CTA' || cmp.id === 'carousel_fly_in') {
                    target = subFolders['FLY_BLOCKS'].inner;
                }
                else if (cmp.tag === 'Fly-In Doc' || cmp.tag === 'Fly-In Safaris') {
                    target = subFolders['FLY_ITIN'].inner;
                }
                // Guided
                else if (cmp.tag === 'Guided FAQ' || cmp.id === 'guided' || cmp.tag === 'Guided CTA' || cmp.id === 'carousel_guided') {
                    target = subFolders['GUI_BLOCKS'].inner;
                }
                else if (cmp.tag === 'Guided Doc' || cmp.tag === 'Guided Safaris') {
                    target = subFolders['GUI_ITIN'].inner;
                }
                // Websites
                else if (cmp.tag === 'Websites') {
                    target = mainFolders['Websites'].inner;
                }
                // Everything else
                else {
                    target = folders['General WP Blocks'].inner;
                }

                target.appendChild(el);
            });

            container.appendChild(mainFolders['Desert Tracks'].details);
            container.appendChild(mainFolders['Rate Generator'].details);
            container.appendChild(mainFolders['Accounting & Costing'].details);
            container.appendChild(mainFolders['Antigravity Tools'].details);
            container.appendChild(mainFolders['Websites'].details);
        }

        // Removed secondary assignment, relying on initial value of -1
        let preloadedCode = "";

        async function loadComponent(idx, welcomeTitle = "DESERT TRACKS UI VAULT") {
            activeIndex = idx;
            localStorage.setItem('vault_active_index', idx);
            
            if (idx === -1) {
                document.getElementById('headerTitle').innerText = "Welcome";
                document.getElementById('headerDesc').innerText = "Please select a component from the left sidebar.";
                document.getElementById('urlBar').innerText = "welcome.html";
                document.getElementById('loader').classList.add('active');
                
                renderNav();
                
                const timestamp = new Date().getTime();
                const frame = document.getElementById('previewFrame');
                frame.src = "welcome.html?title=" + encodeURIComponent(welcomeTitle) + "&v=" + timestamp;
                frame.onload = () => { setTimeout(() => { document.getElementById('loader').classList.remove('active'); }, 300); };
                preloadedCode = "<!-- Please select a component to view source code -->";
                return;
            }
            
            const cmp = components[idx];
            
            document.getElementById('headerTitle').innerText = cmp.title;
            document.getElementById('headerDesc').innerText = cmp.desc;
            document.getElementById('urlBar').innerText = cmp.file;
            document.getElementById('loader').classList.add('active');
            
            renderNav();
            
            const timestamp = new Date().getTime();
            const frame = document.getElementById('previewFrame');
            frame.src = cmp.file + "?v=" + timestamp;
            frame.onload = () => { setTimeout(() => { document.getElementById('loader').classList.remove('active'); }, 300); };
            
            try {
                const res = await fetch(cmp.file + "?v=" + timestamp);
                preloadedCode = await res.text();
            } catch(e) {
                console.error("Failed to preload code");
            }
        }

        function copyActiveCode() {
            if (activeIndex < 0) return;
            
            try {
                // Fallback for older Safari: Hidden text area
                const textArea = document.createElement('textarea');
                textArea.value = preloadedCode;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);

                if (successful) {
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3000);
                    return;
                }
                
                // Modern API if fallback failed
                navigator.clipboard.writeText(preloadedCode).then(() => {
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3000);
                });
            } catch (err) {
                alert("Copy failed. Try opening the source file manually.");
            }
        }

        function viewSource() {
            if (activeIndex < 0) return;
            const cmp = components[activeIndex];
            window.open(cmp.file, '_blank');
        }

        loadComponent(activeIndex);
    </script>
