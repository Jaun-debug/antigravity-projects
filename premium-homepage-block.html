<section id="dt-premium-hero-block" class="dt-hero-section">
  <style>
    /* Scoped CSS for the Hero Block - Safari GPU Fix Applied */
    #dt-premium-hero-block {
      font-family: inherit;
    }

    .dt-hero-section {
      position: relative;
      width: 100%;
      min-height: 80vh; /* Replaced fixed 100vh to prevent Nicepage overlap bugs */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      background-image: url('https://desert-tracks.com/wp-content/uploads/2026/03/solly_4757_3-scaled.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      color: #ffffff;
      margin: 0;
      padding: 100px 0;
      isolation: isolate; /* Creates a new stacking context safely */
      transform: translateZ(0); /* Hardware accelerates independently so it doesn't freeze the carousel */
    }

    .dt-hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.6) 100%);
      z-index: -1; /* Placed behind content safely within the isolate context */
    }

    .dt-hero-content {
      position: relative;
      text-align: left;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 0 40px;
      z-index: 2;
    }

    .dt-hero-title {
      font-family: "Playfair Display", serif;
      font-size: clamp(3rem, 6vw, 5.5rem);
      line-height: 1.1;
      font-weight: 400;
      margin: 0 0 10px;
      color: #ffffff !important;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
      text-transform: uppercase;
    }

    .dt-hero-subtitle {
      font-family: "DM Sans", inherit;
      font-size: clamp(1.5rem, 3vw, 2.8rem);
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 40px;
      display: block;
      font-weight: 300;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.4);
    }

    .dt-safari-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 36px;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      color: #ffffff;
      background: #ff6e00;
      border: 1px solid #ff6e00;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .dt-safari-link:hover {
      background: #ffffff;
      border-color: #ffffff;
      color: #111111;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .dt-hero-content {
        padding: 0 20px;
        text-align: center;
      }
      .dt-hero-title {
        font-size: 3rem;
      }
      .dt-safari-link {
        width: 100%;
        max-width: 300px;
      }
    }
  </style>

  <div class="dt-hero-overlay"></div>

  <div class="dt-hero-content">
    <h1 class="dt-hero-title">Self-Drive Luxury Safaris</h1>
    <span class="dt-hero-subtitle">In Africa</span>
    
    <a href="https://desert-tracks.com/namibia-safaris/" class="dt-safari-link">Our Safari Collection</a>
  </div>
</section>
